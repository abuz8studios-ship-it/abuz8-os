ed)\n\n### What's missing\n- **3PAO security audit** (third-party assessment org)\n- **Penetration testing** (no record)\n- **Secrets management** at scale (manual encrypted storage today)\n- **Multi-tenant isolation** (single-tenant only)\n- **Cyber insurance** (not in place)\n\n### 5 products flagged for pre-public scrub (Partnership Pitch finding)\n1. Q3 — internal API keys in some configs\n2. Soloman — local API keys\n3. LIVE CRM (internal dashboard) — credentials embedded\n4. stripe-fulfillment Worker — Stripe + Resend keys\n5. stripe-webhook Worker — Stripe webhook secret\n\n**Pre-public action required for all 5:** secrets scan + `.env.example` placeholder substitution + git history filter.\n\n---\n\n## 3. COMPLIANCE PATHWAYS\n\n### SOC 2\n- **Type 1 readiness assessment:** 3-6 months ($15K-$30K with Vanta/Drata/Tugboat)\n- **Type 1 audit:** 9-12 months ($25K-$50K)\n- **Type 2 audit:** 18-24 months ($25K-$50K annual)\n- **Controls inventory:** Q3 audit chain + Soloman RBAC are foundational; need formal policies + workforce training + vendor management\n\n### HIPAA\n- **BAA capability:** 6-9 months if first health customer triggers\n- **Required:** PHI segregation + encryption at rest + access logging (already in audit chain) + workforce training + breach response plan\n\n### GDPR / UK GDPR\n- **Privacy policy + ToS audit:** 2-4 weeks ($5K-$15K legal review)\n- **Data residency options:** EU customers require EU data center (Cloudflare can host in EU but ABUZ8 hasn't deployed yet)\n\n### CCPA + state US privacy laws\n- **Privacy notice + opt-out + data subject rights:** part of GDPR work\n\n### FedRAMP Moderate\n- **Timeline:** 12-18 months ($500K-$2M)\n- **Prerequisite:** SOC 2 Type 2 + federal customer or sponsor + 3PAO assessment\n- **NOT pursued today** unless federal opportunity emerges\n\n### Saudi PDPL + UAE Data Protection Law (MENA)\n- **Required if MENA enterprise:** local data residency + Arabic privacy notices\n- **Timeline:** 3-6 months legal + te oman**\n1. Open `E:\\ABU\\ABUZ8_AGENT_OS\\` \n2. Run `scripts\\start.bat`\n3. Build public landing page at abuz8ai.com/soloman (was missing per audit)\n\n**A003 — Zait/OpenClaw**\n1. Open `E:\\ABU\\OPENCLAW\\`\n2. Run `node zait_fork_3.13\\main.js`\n3. Verify `@Abuza8oc_bot` reachable on Telegram\n\n**A004 — Hermes**\n- DO NOT continue commercially. MIT to Nous Research. Use for interop only.\n\n**A005 — abuz8ai.com**\n1. Open `E:\\ABU\\abuz8ai-site\\`\n2. Run `wrangler pages deploy . --project-name=abuz8ai` if changes needed\n3. Check Cloudflare dashboard for deployment status\n\n### Product Packages (15)\n\nFor each of A006-A020, the handoff is:\n1. Open Stripe dashboard → find the product ID in `ABUZ8_MASTER_ASSET_CATALOG.csv`\n2. Check whether any customer has purchased\n3. If yes — fulfill per delivery runbook in `E:\\ABU\\PLAYS_LIVE\\<asset>\\`\n4. If no customers in 14 days — pause Stripe product, reactivate when successor is ready to sell\n\n**Specific delivery runbooks:**\n- PM Rescue → `E:\\ABU\\PLAYS_LIVE\\01_PM_WORKFLOW_RESCUE\\delivery_runbook.md`\n- AI SDR Agent → `E:\\ABU\\PLAYS_LIVE\\02_AI_SDR_AGENT\\`\n- LinkedIn Audit → `E:\\ABU\\PLAYS_LIVE\\03_LINKEDIN_SERVICE_AUDIT\\`\n\n### Media & Content (8)\n\nFor Q3-MEDIA pro tools (A024): ComfyUI :8188 MUST stay up. If down, run `E:\\ABU\\ComfyUI\\START_COMFYUI_VERIFIED.bat`.\n\n### Digital Products (44 PDFs)\n\nAll Stripe-wired. If a customer purchases:\n1. Stripe webhook fires\n2. `stripe-fulfillment` Cloudflare Worker delivers (verify worker is alive: `wrangler tail stripe-fulfillment`)\n3. If fulfillment fails — manual delivery via email from `abuz8studios@gmail.com`\n\n### MCP Tool Clusters (8) — all BUNDLED with Q3\n\nNo standalone handoff. They live inside Q3. Restart Q3 → tools come back.\n\n### Engines / Infrastructure (5)\n\n- URF Engine: `E:\\ABU\\.shared\\urf_engine.js` — internal IP, no commercial action\n- Others: bundled w/ Q3, no standalone action\n\n### Services / Audits (4)\n\nIf any customer in the pipeline at handoff time:\n1. Check Ahmad's CRM in `E:\\ABU\\HTML_VAULT\\crown_jewels\\ABUZ8_CRM.html`\n2. Check `E:\\ABU\\.shared\\broker.sqlite`\n3. Continue delivery per runbook in `E:\\ABU\\PLAYS_LIVE\\<service>\\`\n\n### Souls / Personas (4)\n\nInternal IP. Bundled w/ Q3. No standalone action.\n\n### Cloudflare Workers (3 packs / 8 atomic)\n\nCritical Workers to keep alive:\n- `stripe-fulfillment` — revenue-critical (payment fulfillment)\n- `stripe-webhook` — revenue-critical (Stripe event intake)\n- `waiting-list` — lead capture\n\nIf a Worker fails: `wrangler deploy --env production` from `E:\\ABU\\abuz8ai-site\\functions\\<worker-name>\\`.\n\n### Stripe Subscription Cluster (1)\n\nCheck Stripe dashboard daily for new subscriptions. If a subscription is created → product delivery via existing fulfillment Worker.\n\n### HTML Dashboards / Internal (3)\n\nInternal tools. Keep `E:\\ABU\\HTML_VAULT\\` intact. Do not push contents to public GitHub (operator-info concern from 2026-05-20).\n\n### Strategic IP + Knowledge Library (3)\n\nBundled w/ enterprise tier. Internal IP. No standalone action.\n\n---\n\n## 5. TOP 5 ASSETS TO KEEP ALIVE (IF CAPACITY IS LIMITED)\n\nIf a successor can only maintain 5 things, choose:\n1. **abuz8ai.com** (Cloudflare Pages — front door for all SKUs)\n2. **Q3-CORE** (`E:\\ABU\\QADIR_CORE\\` — flagship technical asset)\n3. **SOL-CORE** (`E:\\ABU\\ABUZ8_AGENT_OS\\` — Soloman OS, second-flagship)\n4. **Stripe account** (49 products configured — revenue infrastructure)\n5. **PLAYS_LIVE** (`E:\\ABU\\PLAYS_LIVE\\` — packaged services with delivery runbooks)\n\nEverything else can sit dormant for 90+ days without business loss.\n\n---\n\n## 6. WHAT NOT TO TOUCH\n\n- Do not delete `E:\\ABU\\QADIR_CORE\\adapters\\` (8 custom LoRA adapters — $80K-$500K replacement)\n- Do not delete `E:\\ABU\\QADIR_CORE\\native_brain\\models\\` (8 custom GGUF models — $50K-$200K replacement)\n- Do not delete `E:\\ABU\\MODELS\\` (1TB+ local model library : sign in with Google + pay Stripe = product is provisioned. No manual setup.**\n\nGenerated 2026-05-21. File #11 of the Enterprise Portfolio Book.\n\n---\n\n## 1. THE VISION (CUSTOMER STORYBOARD)\n\n```\n1. Customer lands on abuz8ai.com/<product>\n2. Clicks \"Get Started\" button\n3. Stripe Checkout opens (one-page) — enters card + email\n4. Pays $9 / $497 / $9,997 (depending on product)\n5. Redirected to abuz8ai.com/welcome\n6. \"Sign in with Google\" button — one click → Google OAuth consent\n7. Customer signs in\n8. Product is provisioned automatically (PDF delivered / agent spawned / dashboard live)\n9. Customer sees their dashboard at app.abuz8ai.com\n10. DONE. Total time: 90 seconds.\n```\n\n**No manual installs. No config files. No API keys to paste. No \"wait for the founder to set you up.\"**\n\n---\n\n## 2. ARCHITECTURE — THE 5 PIECES\n\n| Piece | What it does | Status |\n|---|---|---|\n| **Stripe Checkout + Webhook** | Payment + email collection + subscription state | ✓ LIVE (2 Workers deployed) |\n| **Google OAuth** | Customer identity + session | ✗ MISSING (needs new Worker) |\n| **D1 Customers Database** | Customer record + subscription state + entitlements | ✓ PARTIAL (2 D1 databases exist; schema needs customer table) |\n| **Provisioning Worker** | Per-product provisioning logic (PDF send, agent spawn, dashboard create) | ✗ MISSING (stripe-fulfillment Worker handles PDFs only today) |\n| **Customer Dashboard** | Single SPA at app.abuz8ai.com — login, subscription, downloads, usage | ✗ MISSING (no customer-facing portal exists) |\n\n**Three of five missing.** This is the build for one-click deployment.\n\n---\n\n## 3. PER-PRODUCT-TYPE PROVISIONING\n\n### Type A: Digital Products (44 PDFs) — easiest\n\n**Today:** Stripe checkout → webhook → fulfillment Worker → R2 PDF → Resend email\n\n**To be one-click:**\n1. ✓ Stripe checkout works\n2. ✓ stripe-fulfillment Worker exists\n3. ✗ Verify R2 bucket has ALL 44 PDFs uploaded with consistent naming (e.g., `prod_XXX.pdf`)\n4. ✗ Verify webhook maps each Stripe product ID → R2 PDF path\n5. ✗ Verify Resend template delivers PDF + receipt\n\n**Customer experience:** Pay $19 → email arrives in 60 seconds with PDF link (R2 signed URL, 7-day validity)\n**Build effort:** ~16 hours (audit + fix gaps)\n**No Google OAuth needed for one-time PDF buyers.**\n\n### Type B: Recurring SaaS Subscriptions — needs OAuth + provisioning\n\nProducts: AI Workforce Scout ($497/mo) / Battalion ($2,497/mo) / Empire ($9,997/mo) / Standard MCP ($297/mo) / Qadir MCP ($499/mo + $7K setup) / LotVue360 ($99/mo) / AI SDR Managed ($499/mo) / Soloman ($49-$299/mo)\n\n**To be one-click:**\n1. Stripe Checkout (subscription mode)\n2. Stripe webhook → `provisioning-router` Worker (NEW)\n3. Worker creates customer record in D1\n4. Worker emails magic-link to customer\n5. Customer clicks magic-link → Google OAuth → app.abuz8ai.com/dashboard\n6. Worker provisions the specific product:\n   - **Scout/Battalion/Empire:** Spawns dedicated Cloudflare Worker for that customer's agents w/ their config; binds to D1 row\n   - **LotVue360:** Provisions subdomain `dealer-name.lotvue360.com` (or `lotvue360.com/dealer-name`); customer pastes embed code on their dealer site\n   - **Standard MCP / Qadir MCP:** Spawns customer-specific MCP agent on customer's own infrastructure via Wrangler-driven script (customer connects their Cloudflare account via OAuth too) — for Qadir setup tier, schedule a kickoff call instead\n   - **Soloman:** Generates per-customer license key; sends installer download link from R2\n   - **AI SDR Managed:** Spawns SDR agent Worker for customer's domain w/ Resend DKIM setup\n\n**Customer experience:** Pay $497 → email in 60s → click magic link → Google sign-in → dashboard live with their agent operating\n**Build effort:** ~80-160 hours engineer + ~40-80 hours founder review\n\n### Type C: Services (PM Rescue / LinkedIn Audit / Custom LoRA / Deep Automation Map / Data Pipeline)\n\nThese cannot be 100% one-click (they require founder/team delivery). But the **booking** can be one-click.\n\n**To be one-click-booked:**\n1. Stripe Checkout (one-time)\n2. Webhook → `service-booking` Worker (NEW)\n3. Customer redirected to Cal.com or Calendly embed (with Google OAuth via Cal.com's built-in flow)\n4. Customer books delivery slot\n5. Founder gets notification + customer files via D1\n6. Founder executes service + delivers via dashboard\n\n**Customer experience:** Pay $1,500 → redirected to Cal embed → books slot → done\n**Build effort:** ~20-40 hours (Cal.com integration + webhook wiring)\n\n### Type D: Custom Enterprise (Q3-CORE $10K-$80K deployments)\n\nThese cannot be one-click. They require sales conversation + custom deployment. **But the entry pilot can be self-serve.**\n\n**Entry pilot one-click:**\n1. \"Schedule Discovery Call\" CTA → Cal.com (no Stripe yet)\n2. After call, custom-priced Stripe Checkout link sent via email\n3. After payment, founder + engineer execute custom deployment\n\n---\n\n## 4. THE GOOGLE OAUTH IMPLEMENTATION\n\n```\nabuz8ai.com/login\n     ↓\nCloudflare Workers \"auth\" Worker\n     ↓\nGoogle OAuth 2.0 (PKCE flow)\n     ↓\nReceive id_token (JWT)\n     ↓\nVerify token + create session cookie (signed JWT, 7-day expiry, HttpOnly, Secure, SameSite=Lax)\n     ↓\nLookup customer in D1 by email\n     ↓\nIf no customer record → create new (free tier or redirect to checkout)\nIf customer record exists → load entitlements + redirect to dashboard\n```\n\n**Required env vars (per Cloudflare Worker):**\n- `GOOGLE_OAUTH_CLIENT_ID`\n- `GOOGLE_OAUTH_CLIENT_SECRET`\n- `SESSION_SIGNING_SECRET` (random 32-byte HMAC key)\n\n**Build:** ~16-24 engineer hours (one Worker + Google Cloud Console OAuth app setup + D1 schema)\n\n**Google Cloud Console setup:**\n1. Create OAuth 2.0 client ID in Google Cloud Console\n2. Authorized origins: `https://abuz8ai.com`, `https://app.abuz8ai.com`\n3. Authorized redirect URIs: `https://abuz8ai.com/auth/google/callback`\n4. Consent screen verified (avoid \"Unverified app\" warning)\n\n---\n\n## 5. THE D1 SCHEMA\n\n```sql\n-- customers table (extend abuz8_waitlist D1 or create new abuz8_customers)\nCREATE TABLE customers (\n  id TEXT PRIMARY KEY,                -- UUIDv4\n  email TEXT NOT NULL UNIQUE,\n  stripe_customer_id TEXT UNIQUE,\n  google_sub TEXT UNIQUE,             -- Google's stable user ID\n  display_name TEXT,\n  created_at INTEGER NOT NULL,\n  updated_at INTEGER NOT NULL\n);\n\nCREATE TABLE subscriptions (\n  id TEXT PRIMARY KEY,                -- UUIDv4\n  customer_id TEXT NOT NULL REFERENCES customers(id),\n  stripe_subscription_id TEXT UNIQUE,\n  stripe_product_id TEXT NOT NULL,\n  stripe_price_id TEXT NOT NULL,\n  status TEXT NOT NULL,               -- active / past_due / canceled / trialing\n  current_period_end INTEGER NOT NULL,\n  cancel_at_period_end INTEGER NOT NULL DEFAULT 0,\n  created_at INTEGER NOT NULL,\n  updated_at INTEGER NOT NULL\n);\n\nCREATE TABLE entitlements (\n  id TEXT PRIMARY KEY,\n  customer_id TEXT NOT NULL REFERENCES customers(id),\n  product_key TEXT NOT NULL,          -- e.g., \"ai_workforce_scout\"\n  config_json TEXT,                   -- per-product config (agent name / domain / etc.)\n  status TEXT NOT NULL,               -- provisioned / pending / failed\n  provisioning_worker_url TEXT,       -- the per-customer Worker URL if applicable\n  created_at INTEGER NOT NULL,\n  updated_at INTEGER NOT NULL\n);\n\nCREATE TABLE provisioning_log (\n  id TEXT PRIMARY KEY,\n  customer_id TEXT NOT NULL REFERENCES customers(id),\n  entitlement_id TEXT REFERENCES entitlements(id),\n  step TEXT NOT NULL,                 -- e.g., \"stripe_webhook_received\", \"worker_spawned\"\n  status TEXT NOT NULL,               -- ok / error\n  details_json TEXT,\n  ts INTEGER NOT NULL\n);\n\nCREATE TABLE downloads (\n  id TEXT PRIMARY KEY,\n  customer_id TEXT NOT NULL REFERENCES customers(id),\n  stripe_product_id TEXT NOT NULL,\n  r2_key TEXT NOT NULL,               -- file in abuz8-downloads\n  signed_url_last_issued INTEGER,\n  download_count INTEGER NOT NULL DEFAULT 0,\n  created_at INTEGER NOT NULL\n);\n```\n\n**Build:** ~4 engineer hours (schema + migration + indexes)\n\n---\n\n## 6. THE PROVISIONING ROUTER WORKER\n\nA new Cloudflare Worker — `provisioning-router` — bound to the same Stripe webhook.\n\n```javascript\n// Pseudocode\nexport default {\n  async fetch(request, env) {\n    const event = await verifyStripeSignature(request, env.STRIPE_WEBHOOK_SECRET);\n\n    switch (event.type) {\n      case 'checkout.session.completed':\n        return await provision(event, env);\n      case 'customer.subscription.deleted':\n        return await deprovision(event, env);\n      case 'invoice.payment_failed':\n        return await suspend(event, env);\n    }\n  }\n};\n\nasync function provision(event, env) {\n  const productId = event.data.object.line_items.data[0].price.product;\n\n  // Route to per-product provisioner\n  const provisioner = PROVISIONERS[productId];\n  if (!provisioner) {\n    // Default fallback — digital product PDF delivery\n    return await provisionDigitalProduct(event, env);\n  }\n  return await provisioner(event, env);\n}\n\nconst PROVISIONERS = {\n  // AI Workforce Scout\n  'prod_UJz4Ljwz0b5WMu': provisionScoutAgent,\n  // AI Workforce Battalion\n  'prod_UJz4djNpmVEObD': provisionBattalionAgents,\n  // AI Workforce Empire\n  'prod_UJz4H7QXLdmZhw': provisionEmpireInfra,\n  // Qadir MCP Setup\n  'prod_USmuwuFnZyKQ0n': scheduleQadirMCPKickoff,\n  // Standard MCP\n  'prod_USmubezJNbx0kN': scheduleStandardMCPKickoff,\n  // LotVue360 Pro\n  'prod_UILaDYdvD4L8zd': provisionLotVueDealer,\n  // AI SDR Managed\n  // ... 49 product IDs mapped to provisioner functions\n};\n```\n\n**Build:** ~40-80 engineer hours (router + 8 distinct provisioner functions + tests)\n\n---\n\n## 7. THE CUSTOMER DASHBOARD (app.abuz8ai.com)\n\nSingle-page application at `app.abuz8ai.com`. Tech choice (lightest path):\n- **Static HTML + Tailwind CDN + Alpine.js** for state\n- **Cloudflare Workers** for API endpoints (`GET /api/me`, `GET /api/subscriptions`, `GET /api/downloads`, `POST /api/agents/:id/config`)\n- **Google OAuth session** (cookie-based, signed JWT)\n- **Hosted on Cloudflare Pages** as a subdomain\n\n**Pages:**\n1. `/` — Dashboard home (subscription status + product cards)\n2. `/downloads` — Digital product downloads (signed R2 URLs)\n3. `/agents` — Active agents (Scout/Battalion/Empire) + config + usage\n4. `/subscription` — Stripe Customer Portal redirect (Stripe-hosted, native)\n5. `/support` — Email founder + Telegram link\n6. `/account` — Email + Google identity + delete account\n\n**Build:** ~60-120 engineer hours + ~20-40 designer hours\n\n---\n\n## 8. BUILD SEQUENCE (RECOMMENDED)\n\n| Phase | Hours | Output | Unblocks |\n|---|---|---|---|\n| **Phase 1: Stripe Per-Product Audit** | 8 | All 49 Stripe products verified end-to-end | Existing checkouts work cleanly |\n| **Phase 2: Digital Product Fulfillment Polish** | 16 | All 44 PDFs deliverable via webhook + R2 + Resend | First 44 one-click products |\n| **Phase 3: D1 Customer Schema + Migration** | 8 | Customer + subscription + entitlement tables live | Foundation for Phase 4-6 |\n| **Phase 4: Google OAuth Worker** | 24 | abuz8ai.com/login → Google → session cookie | Customer identity established |\n| **Phase 5: Customer Dashboard (MVP)** | 80 | Customer can log in + see subscriptions + download PDFs | Self-service customer experience |\n| **Phase 6: Provisioning Router (PDFs first)** | 40 | Webhook → router → digital product fulfilment via D1 | Reliable one-click for digital |\n| **Phase 7: Provisioning Router (subscriptions)** | 80 | Per-customer agent spawning for Scout/Battalion/Empire/LotVue/SDR | One-click recurring SaaS |\n| **Phase 8: Service Booking Integration** | 24 | Cal.com embed for PM Rescue / LinkedIn Audit / Custom LoRA | Services bookable one-click |\n| **Phase 9: Soloman License + Installer** | 40 | License key system + signed installer download | Soloman one-click purchase |\n| **Phase 10: Q3 Multi-tenant Cloud Tier** | 200-400 | Per-customer Q3 instances on Cloudflare Durable Objects or per-customer Workers | Q3 SaaS subscription tier (Starter/Pro tiers) |\n| **Total Phase 1-9 (subscription SaaS one-click)** | **~320 hours** | **All ~75 one-click-eligible SKUs working** | |\n| **Total Phase 1-10 (full SaaS Q3 included)** | **~520-720 hours** | **Full self-serve enterprise tier** | |\n\n**At founder rate of ~$200/hr blended (Ahmad + future contractor mix): $64K-$144K to ship complete one-click deployment.**\n\n---\n\n## 9. WHAT EXISTS TODAY VS WHAT NEEDS BUILDING\n\n| Component | Status |\n|---|---|\n| Stripe products configured | ✓ 49/49 |\n| Stripe Checkout flow | ✓ LIVE |\n| Stripe webhook receiver | ✓ LIVE (`stripe-webhook` Worker) |\n| Stripe fulfillment dispatcher | ✓ PARTIAL (`stripe-fulfillment` handles PDFs; not full router) |\n| R2 bucket (abuz8-downloads) | ✓ LIVE |\n| D1 databases | ✓ 2 LIVE (need customer + subscription + entitlement schema) |\n| KV namespace (STRIPE_EVENTS for idempotency) | ✓ LIVE |\n| Resend transactional email | ✓ Configured (need template suite) |\n| Cloudflare Pages (abuz8ai.com) | ✓ LIVE |\n| **Google OAuth Worker** | ✗ MISSING |\n| **Customer Dashboard SPA** | ✗ MISSING |\n| **Provisioning Router Worker** | ✗ MISSING |\n| **Per-customer agent spawning** | ✗ MISSING |\n| **Magic-link onboarding email** | ✗ MISSING |\n| **Stripe Customer Portal integration** | ✗ MISSING (1-hour add) |\n| **D1 customer schema** | ✗ MISSING (4-hour add) |\n| **PDF→R2 mapping for all 44 PDFs** | ✗ PARTIAL (some uploaded, some unverified) |\n\n---\n\n## 10. THE FAST PATH (90% OF VALUE IN 25% OF WORK)\n\nIf you can only build ONE thing this month, build **Phase 2: Digital Product Fulfillment Polish** (~16 hours).\n\n**Why:** 44 of 49 Stripe products are one-time PDF buys. Fixing the fulfillment chain (webhook → R2 lookup → Resend delivery) makes ALL 44 work one-click TODAY. No Google OAuth needed for PDF buyers. No customer dashboard needed.\n\n**Customer journey post-Phase-2:**\n```\n1. Customer hits abuz8ai.com/products/100-prompts ($19)\n2. Clicks \"Buy Now\" → Stripe Checkout\n3. Pays $19 with card\n4. Within 60 seconds: receives email with PDF link\n5. Clicks link → downloads PDF\n6. DONE\n```\n\n**That alone unlocks 44 products × $9-$497 = potential $400-$22K/month in micro-revenue if marketing drives traffic.**\n\nThe subscription one-click (Phase 4-7) is harder and bigger payoff ($497-$9,997/mo recurring) but takes 4× the time.\n\n---\n\n## 11. EXTERNAL DEPENDENCIES\n\n| Service | Why | Status | Free Tier OK? |\n|---|---|---|---|\n| Stripe | Payments | LIVE | Yes (pay-per-transaction) |\n| Cloudflare Workers + R2 + D1 + KV + Pages | Infra | LIVE | Yes (generous free tier) |\n| Resend | Transactional email | Need to configure DKIM/SPF/DMARC for abuz8ai.com | Yes for 3K/mo, then $20/mo |\n| Google Cloud (OAuth) | Sign-in | NOT CONFIGURED | Yes (free OAuth) |\n| Cal.com OR Calendly | Service booking | NOT CONFIGURED | Cal.com $0 (self-hosted) / Calendly $10/mo |\n| **Total monthly OPEX** | | | **$0-$30/mo until ~1K customers** |\n\n---\n\n## 12. SECURITY + COMPLIANCE NOTES\n\n- Google OAuth ID token must be verified server-side (do not trust client claims)\n- Session cookies: `HttpOnly + Secure + SameSite=Lax + Path=/`\n- All D1 writes go through Workers (no direct SQL from customer dashboard)\n- R2 signed URLs expire after 7 days (regenerate on demand)\n- Stripe webhook signatures verified with `STRIPE_WEBHOOK_SECRET`\n- All env vars in Cloudflare encrypted secrets, never in code\n- DPA + Privacy Policy + ToS must be live BEFORE first paying customer (legal blocker)\n- GDPR: Cloudflare can route to EU data center if EU customer (Phase 11)\n- HIPAA: do NOT collect PHI in customer dashboard; route to BAA-covered processing only\n\n---\n\n## 13. THE 24-HOUR DEMO PROOF\n\nWhat you can prove in 24 hours of focused work:\n1. Buy AI Resume ($9) on abuz8ai.com → receive PDF in inbox within 60 seconds → demo proves Phase 2 fulfillment works\n2. Loom video showing the entire flow\n3. Post-purchase email confirms automation worked\n\nThis single demo = sales asset for the subscription-tier conversation. Every enterprise prospect needs to see one-click work somewhere before trusting one-click for their bigger purchase.\n\n---\n\n## 14. BOTTOM LINE\n\n**Today:** Stripe wired, infrastructure deployed, 5 of 5 architecture pieces partially built. 2 of 5 (OAuth + Dashboard) genuinely missing.\n\n**With ~320 focused engineer hours + ~$5K-$15K freelance budget:**\n- ✓ All 44 PDFs one-click\n- ✓ All 8 subscription products one-click\n- ✓ All 5 services one-click-booked\n- ✓ Customer dashboard at app.abuz8ai.com\n- ✓ Self-serve subscription management via Stripe Customer Portal\n- ✗ Q3 multi-tenant SaaS still needs Phase 10 (200-400 hrs more)\n\n**Fastest demo:** 16 hours → 44 PDFs work one-click → first $1K-$5K in micro-revenue this month.\n\n**Critical hires for this build:**\n- 1 senior Cloudflare Workers engineer (~$80-$150/hr, ~40 hrs/wk for 2 months)\n- 1 designer for customer dashboard UX (~$60-$100/hr, ~40 hrs total)\n\nThe infrastructure exists. The provisioning logic doesn't. This blueprint is the recipe.\n\n---\n\n**Bismillah. One click. One sign-in. One charge. One customer. Then ten. Then a thousand.**\n","order":11,"title":"One-Click Deployment Blueprint","ext":"md","file":"ABUZ8_ONE_CLICK_DEPLOYMENT_BLUEPRINT.md"},"proof":{"content":"# ABUZ8 PROOF AND CLAIMS REGISTER\n**Every claim marked verified / partial / unverified / false with evidence**\n\nGenerated 2026-05-21 08:41 EDT. **Truth-protection document.**\n\n---\n\n## STATUS LEGEND\n\n- **VERIFIED** — claim confirmed by disk inspection, MCP probe, file existence, or external service\n- **PARTIAL** — claim partially supported; needs additional evidence or scope clarification\n- **UNVERIFIED** — claim plausible but no concrete evid function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, function (c) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];
  });
}

function parseCsvRow(line) {
  var out = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { out.push(cur); cur = ''; continue; }
    cur += c;
  }
  out.push(cur);
  return out;
}

function renderCsv(content) {
  var lines = content.split(/\r?\n/).filter(function (l) { return l.length > 0; });
  if (lines.length === 0) return '<p>Empty CSV.</p>';
  var headers = parseCsvRow(lines[0]);
  var rows = lines.slice(1).map(parseCsvRow);
  var html = '<div class="csv-controls"><input type="text" id="csv-search" placeholder="Filter ' + rows.length + ' rows..." />';
  html += '<div class="count"><span id="csv-count">' + rows.length + '</span> rows</div></div>';
  html += '<div class="csv-wrap"><table><thead><tr>';
  headers.forEach(function (h) { html += '<th>' + escapeHtml(h) + '</th>'; });
  html += '</tr></thead><tbody id="csv-body">';
  rows.forEach(function (r, idx) {
    html += '<tr data-row="' + idx + '">';
    r.forEach(function (cell) { html += '<td title="' + escapeHtml(cell) + '">' + escapeHtml(cell) + '</td>'; });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

    search.addEventListener('input', function (e) {
      var q = e.target.value.toLowerCase();
      var visible = 0;
      var trs = tbody.querySelectorAll('tr');
      for (var i = 0; i < trs.length; i++) {
        var match = trs[i].textContent.toLowerCase().indexOf(q) !== -1;
        trs[i].style.display = match ? '' : 'none';
        if (match) visible++;
      }
      countEl.textContent = visible;
    });
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

var allButtons = document.querySelectorAll('nav.docs button');
for (var i = 0; i < allButtons.length; i++) {
  (function (btn) {
    btn.addEventListener('click', function () {
      show(btn.getAttribute('data-doc'));
      document.querySelector('aside.sidebar').classList.remove('open');
    });
  })(allButtons[i]);
}

show('hero');
</script>
</body>
</html>
